name: Issue Summary Bot

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Generate issue summary
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        with:
          script: |
            const marker = '<!-- issue-summary-bot -->';
            const reminderMarker = '<!-- issue-summary-bot-reminder -->';
            const title = process.env.ISSUE_TITLE || '';
            const body = process.env.ISSUE_BODY || '';
            const author = process.env.ISSUE_AUTHOR || '';
            const issueNumber = process.env.ISSUE_NUMBER || '';
            const issueUrl = process.env.ISSUE_URL || '';

            const lines = body.split('\n').map(line => line.trimRight());
            const sectionTitles = [
              '## 📋 基本信息', '## 📋 Environment',
              '## 🐛 问题描述', '## 🐛 Bug Description',
              '## 📝 复现步骤', '## 📝 Steps to Reproduce',
              '## ✅ 期望行为', '## ✅ Expected Behavior',
              '## 💡 补充说明', '## 💡 Additional Context',
              '## 💡 功能描述', '## 💡 Feature Description',
              '## 🎯 使用场景', '## 🎯 Use Case',
              '## 🎨 期望的实现方式', '## 🎨 Proposed Solution',
              '## 📸 参考示例', '## 📸 Examples or References'
            ];

            function getSectionContent(sectionName) {
              const index = lines.findIndex(line => line.startsWith(sectionName));
              if (index === -1) return '';
              const content = [];
              for (let i = index + 1; i < lines.length; i += 1) {
                const line = lines[i];
                if (sectionTitles.some(title => line.startsWith(title))) break;
                if (line.startsWith('---')) break;
                if (line.startsWith('**提交前确认：**') || line.startsWith('**Before submitting:**')) break;
                if (line.startsWith('<!--')) continue;
                content.push(line);
              }
              return content.join('\n').trim();
            }

            function cleanText(value) {
              return value
                .replace(/```[\s\S]*?```/g, ' [代码块已省略] ')
                .replace(/<!--.*?-->/g, '')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
            }

            function hasMeaningfulContent(value) {
              if (!value) return false;
              const normalized = value
                .replace(/```[\s\S]*?```/g, ' ')
                .replace(/[\s`>*\-_[\]()]/g, '')
                .trim();
              return normalized.length >= 6;
            }

            function oneLine(value, fallback) {
              if (!hasMeaningfulContent(value)) return fallback;
              return value
                .replace(/\n+/g, ' / ')
                .replace(/\s+/g, ' ')
                .slice(0, 220)
                .trim();
            }

            function compactList(value, fallback, maxItems = 3) {
              if (!hasMeaningfulContent(value)) return [fallback];
              const items = value
                .split('\n')
                .map(line => line.replace(/^[-*\d.\s]+/, '').trim())
                .filter(Boolean)
                .slice(0, maxItems);
              return items.length > 0 ? items : [oneLine(value, fallback)];
            }

            function detectArea(text) {
              const content = text.toLowerCase();
              const areas = [
                { name: 'WebDAV 同步', patterns: ['webdav', '同步', 'sync', 'restore', '备份'] },
                { name: '115 集成', patterns: ['115', '离线下载', '网盘'] },
                { name: 'AI 翻译', patterns: ['ai', '翻译', 'translator', 'gemini', 'openai', 'claude'] },
                { name: '隐私保护', patterns: ['隐私', 'privacy', '密码', 'lock', '加密'] },
                { name: '新作品', patterns: ['新作品', 'new works', '订阅'] },
                { name: '搜索功能', patterns: ['搜索', 'search', '磁力', 'magnet'] },
                { name: '设置面板', patterns: ['settings', '设置', '配置'] },
                { name: '站点兼容性', patterns: ['javdb', 'javbus', '页面', 'selector', 'dom'] }
              ];
              const match = areas.find(area => area.patterns.some(pattern => content.includes(pattern)));
              return match ? match.name : '相关模块';
            }

            const environment = cleanText(getSectionContent('## 📋 基本信息') || getSectionContent('## 📋 Environment'));
            const description = cleanText(getSectionContent('## 🐛 问题描述') || getSectionContent('## 🐛 Bug Description') || getSectionContent('## 💡 功能描述') || getSectionContent('## 💡 Feature Description'));
            const steps = cleanText(getSectionContent('## 📝 复现步骤') || getSectionContent('## 📝 Steps to Reproduce') || getSectionContent('## 🎯 使用场景') || getSectionContent('## 🎯 Use Case'));
            const expected = cleanText(getSectionContent('## ✅ 期望行为') || getSectionContent('## 🎨 期望的实现方式') || getSectionContent('## 🎨 Proposed Solution'));
            const extra = cleanText(getSectionContent('## 💡 补充说明') || getSectionContent('## 💡 Additional Context') || getSectionContent('## 📸 参考示例') || getSectionContent('## 📸 Examples or References'));

            const type = title.toLowerCase().includes('[feature]') ? '功能建议' : '问题反馈';
            const area = detectArea(`${title}\n${body}`);
            const missingItems = [];
            if (type === '问题反馈' && !hasMeaningfulContent(environment)) missingItems.push('环境信息');
            if (!hasMeaningfulContent(description)) missingItems.push('核心描述');
            if (!hasMeaningfulContent(steps)) missingItems.push(type === '功能建议' ? '使用场景' : '复现步骤');
            if (!hasMeaningfulContent(expected)) missingItems.push(type === '功能建议' ? '建议方案' : '期望行为');

            const judgment = type === '功能建议'
              ? `这条 Issue 指向 ${area} 的功能建议，当前需求重点是 ${oneLine(description || expected, '功能诉求还不够具体')}。`
              : `这条 Issue 指向 ${area} 的异常，当前更像是 ${oneLine(description, '一个待进一步定位的问题')}。`;

            const knownFacts = [];
            if (hasMeaningfulContent(description)) knownFacts.push(oneLine(description, ''));
            if (hasMeaningfulContent(environment)) knownFacts.push(`环境：${oneLine(environment, '')}`);
            if (hasMeaningfulContent(expected)) knownFacts.push(`期望：${oneLine(expected, '')}`);
            if (knownFacts.length === 0) knownFacts.push('当前正文信息较少，定位信息不足。');

            const summary = [
              marker,
              '## 🤖 Triage Summary',
              '',
              judgment,
              '',
              '已知信息：',
              ...knownFacts.slice(0, 3).map(item => `- ${item}`),
              '',
              '待补充：',
              ...(missingItems.length > 0 ? missingItems.map(item => `- ${item}`) : ['- 信息完整，可直接继续判断']),
              '',
              `补充说明：${oneLine(extra, '当前没有额外补充')}`,
              `提交者：@${author}`,
              `原始链接：${issueUrl}`
            ].join('\n');

            const reminder = missingItems.length > 0
              ? [
                  reminderMarker,
                  '## 📝 信息补充提醒',
                  '',
                  `@${author} 为了更快处理这条 Issue，请补充这些内容：`,
                  '',
                  ...missingItems.map(item => `- ${item}`),
                  '',
                  '- 补充完成后直接编辑原 Issue 即可，Bot 会自动刷新总结。'
                ].join('\n')
              : '';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(issueNumber),
              per_page: 100,
            });

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(issueNumber),
            });

            const currentLabels = new Set((issue.labels || []).map(label => typeof label === 'string' ? label : label.name));
            const summaryComment = comments.find(comment => comment.body && comment.body.includes(marker));
            const reminderComment = comments.find(comment => comment.body && comment.body.includes(reminderMarker));

            if (summaryComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: summaryComment.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
                body: summary,
              });
            }

            if (reminder) {
              if (!currentLabels.has('needs-info')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: Number(issueNumber),
                  labels: ['needs-info'],
                });
              }

              if (reminderComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: reminderComment.id,
                  body: reminder,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: Number(issueNumber),
                  body: reminder,
                });
              }
            } else {
              if (currentLabels.has('needs-info')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: Number(issueNumber),
                  name: 'needs-info',
                }).catch(() => undefined);
              }

              if (reminderComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: reminderComment.id,
                });
              }
            }
