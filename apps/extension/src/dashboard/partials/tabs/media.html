<div class="media-library-page" data-media-page>
  <div class="media-toolbar">
    <div class="media-title-block">
      <h2>媒体库</h2>
      <p class="media-toolbar-desc">按来源浏览已入库条目；配置 Emby / Jellyfin 并同步后会接入真实索引。</p>
    </div>
    <div class="media-filters">
      <button type="button" class="media-filter-chip is-active" data-media-filter="all">全部来源</button>
      <button type="button" class="media-filter-chip" data-media-filter="emby">Emby</button>
      <button type="button" class="media-filter-chip" data-media-filter="jellyfin">Jellyfin</button>
      <button type="button" class="media-filter-chip" data-media-filter="115">115</button>
      <label class="media-search">
        <i class="fas fa-search" aria-hidden="true"></i>
        <input type="search" id="mediaLibrarySearch" placeholder="搜索番号 / 标题" autocomplete="off" />
      </label>
    </div>
  </div>

  <section class="media-hero-carousel" aria-label="推荐轮播">
    <div class="media-hero-track" id="mediaHeroTrack"></div>
    <button type="button" class="media-hero-nav prev" id="mediaHeroPrev" aria-label="上一张">‹</button>
    <button type="button" class="media-hero-nav next" id="mediaHeroNext" aria-label="下一张">›</button>
    <div class="media-hero-dots" id="mediaHeroDots"></div>
  </section>

  <section class="media-grid-section" aria-label="片库条目">
    <div class="media-section-head">
      <h3>片库条目</h3>
      <span id="mediaLibraryCount">0 部 · 横向封面</span>
    </div>
    <div class="media-landscape-grid" id="mediaLibraryGrid"></div>
    <div class="media-library-empty-state" id="mediaLibraryEmpty" hidden>
      <div class="media-library-empty-icon"><i class="fas fa-film" aria-hidden="true"></i></div>
      <div>
        <h3>这里还没有可展示的条目</h3>
        <p>可先到设置中配置 Emby / Jellyfin 并完成同步；当前筛选下若无结果，可切换来源或清空搜索。</p>
        <a class="media-empty-link" href="#tab-settings/emby-settings">前往 Emby / Jellyfin 设置</a>
      </div>
    </div>
  </section>

  <div class="media-preview-note" role="note">
    界面预览数据仅用于展示浏览结构。完成服务器配置与同步后，将替换为真实入库索引。
  </div>
</div>
